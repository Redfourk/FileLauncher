name: Publish to TestPyPI

on:
  push:
    tags:
      - 'v*' # Triggers the workflow on version tags, e.g., v0.1.0.dev4

jobs:
  build-n-publish:
    name: Build and Publish to TestPyPI
    runs-on: windows-latest
    environment:
      name: release
      url: https://test.pypi.org/p/FileLauncher_Redfourk

    permissions:
      # This permission is required for TestPyPI Trusted Publishing (OIDC authentication)
      id-token: write
      contents: read

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Matches your minimum supported version

    - name: Install Build Tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install build

    - name: Build Wheel and Source Distribution
      run: |
        python -m build

    - name: Publish Package to TestPyPI
      uses: pypa/github-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
